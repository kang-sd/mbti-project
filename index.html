<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성격 분석 검사</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      padding: 16px;
      max-width: 900px;
      margin: auto;
      background-color: #f7fbff;
    }
    h2 { color: #0050a0; text-align: center; }
    .warning {
      background-color: #ffdddd;
      color: #a00;
      padding: 12px;
      border: 1px solid #a00;
      border-radius: 5px;
      margin: 10px 0;
      display: none;
    }
    .question {
      margin-bottom: 24px;
      padding: 12px;
      border-bottom: 1px solid #ccc;
      font-size: 18px;
    }
    .btn-choice {
      display: inline-block;
      margin-right: 10px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #f0f0f0;
      border: 1px solid #bbb;
      border-radius: 6px;
      cursor: pointer;
      color: black;
    }
    .btn-choice.selected {
      background-color: #007BFF;
      color: white;
      border-color: #007BFF;
    }
    input[type="text"] {
      font-size: 18px;
      padding: 10px;
      width: 60%;
      max-width: 300px;
      margin-right: 10px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      background-color: #2d7ff9;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #115fd3; }
    .btn-submit {
      display: block;
      width: 100%;
      font-size: 20px;
      padding: 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      margin: 30px 0 10px;
    }
    .btn-submit:hover { background-color: #218838; }
    .confirm-box {
      background: #fff8e1;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    .confirm-box button {
      margin-right: 10px;
      font-size: 16px;
      padding: 8px 20px;
    }
    #spinner {
      display: none;
      text-align: center;
      padding: 30px;
      font-size: 18px;
      color: #555;
    }
    @media (max-width: 600px) {
      .btn-choice {
        padding: 14px 18px;
        font-size: 18px;
        display: block;
        width: 100%;
        margin-bottom: 10px;
      }
      input[type="text"] { width: 100%; margin-bottom: 10px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>

  <h2>성격 분석 검사</h2>

  <!-- 검사 설명 박스 -->
  <div style="background-color:#f0f8ff; border-left:6px solid #007BFF; padding:16px; margin-bottom:20px; border-radius:8px;">
    <strong style="font-size:18px; color:#0050a0;">💡 성격 분석 검사란?</strong><br>
    성격테스트 결과로 알 수 있는 성격 유형은 총 16가지이며<br>
    의사소통, 대인관계, 성격부터 진로, 적성 등을 알 수 있는 성격 테스트입니다.<br>
    결과는 <strong style="color:#0050a0;">막대그래프</strong>로 시각화됩니다.
  </div>

  <!-- 유의사항 박스 -->
  <div style="background-color:#f8f9fa; border-left:6px solid #6c757d; padding:16px; margin-bottom:30px; border-radius:8px;">
    <strong style="font-size:16px; color:#333;">🔍 검사 유의사항</strong><br>
    - 본 검사는 유효한 결과를 위해 <strong>66문항</strong>으로 구성합니다<br>
    - 결과는 <strong>3일간 보관</strong>되며 자동 삭제됩니다<br>
    - 기존 검사자는 <strong>이름 검색</strong>으로 결과 확인 가능합니다.
  </div>

  <!-- 경고 메시지 -->
  <div id="searchWarningBox" class="warning"><span id="searchWarningText"></span></div>

  <!-- 이름 입력 + 검색 -->
  <p>
    이름: <input type="text" id="nameInput" placeholder="이름을 입력하세요" autocomplete="off">
    <button onclick="searchPrevious()">검색</button>
  </p>

  <!-- 검색 결과 -->
  <div id="searchResponse"></div>

  <!-- 로딩 스피너 -->
  <div id="spinner">⏳ 잠시만 기다려 주세요...</div>

  <!-- 문항 폼 -->
  <form id="mbtiForm"></form>

  <!-- 미응답 경고 -->
  <div class="warning" id="answerWarningBox">
    <span id="answerWarningText"></span>
  </div>

  <!-- 결과 보기 버튼 -->
  <button id="submitBtn" class="btn-submit" onclick="submitAnswers()">결과 보기</button>

  <!-- 결과 출력 영역 -->
  <div id="resultSection" style="display:none;">
    <h3 id="mbtiTitle"></h3>
    <h4 id="mbtiSubtitle"></h4>
    <div id="resultTable"></div>
    <br>
    <canvas id="mbtiChart" width="400" height="300"></canvas>
    <br><br>
    <button onclick="location.reload()">🔁 나가기</button>
  </div>

<script>
  // ✅ Firebase Cloud Functions 베이스 URL — 배포 후 실제 프로젝트 URL로 교체
  const FN = "https://us-central1-mbti-project-cb2a0.cloudfunctions.net";

  let questionData = [], answers = {}, currentUserName = "", lastSearchResult = null;
  let chartInstance = null;

  // ── 공통 API 호출 래퍼 ──────────────────────────────────────────────────────
  async function api(endpoint, body) {
    const res = await fetch(`${FN}/${endpoint}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "서버 오류");
    return data;
  }

  // ── 경고 메시지 ─────────────────────────────────────────────────────────────
  function showWarning(msg) {
    const box = document.getElementById("searchWarningBox");
    document.getElementById("searchWarningText").textContent = msg;
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 4000);
  }

  function setSpinner(on) {
    document.getElementById("spinner").style.display = on ? "block" : "none";
    document.getElementById("mbtiForm").style.display = on ? "none" : "block";
    document.getElementById("submitBtn").style.display = on ? "none" : "block";
  }

  // ── 페이지 로드 시 문항 불러오기 ────────────────────────────────────────────
  window.onload = async () => {
    setSpinner(true);
    try {
      const { questions } = await api("getQuestions", {});
      renderQuestions(questions);
    } catch (e) {
      alert("문항 로드 실패: " + e.message);
    } finally {
      setSpinner(false);
    }
  };

  // ── 문항 렌더링 ─────────────────────────────────────────────────────────────
  function renderQuestions(data) {
    questionData = data;
    const form = document.getElementById("mbtiForm");
    form.innerHTML = "";
    data.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";
      div.innerHTML = `
        <p>${i + 1}. ${q.text}</p>
        <button type="button" class="btn-choice" onclick="selectAnswer('${q.id}','${q.code1}',this)">${q.a}</button>
        <button type="button" class="btn-choice" onclick="selectAnswer('${q.id}','${q.code2}',this)">${q.b}</button>
      `;
      form.appendChild(div);
    });
  }

  // ── 선택 기록 ───────────────────────────────────────────────────────────────
  function selectAnswer(qid, code, btn) {
    answers[qid] = code;
    btn.parentElement.querySelectorAll(".btn-choice").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
  }

  // ── 이름 검색 (기존 결과 조회) ──────────────────────────────────────────────
  async function searchPrevious() {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return showWarning("이름을 입력해주세요.");
    currentUserName = name;

    const box = document.getElementById("searchResponse");
    box.innerHTML = "<p style='color:#888;'>🔍 검색 중...</p>";
    try {
      const data = await api("loadPreviousResult", { name });
      lastSearchResult = data.found ? data.result : null;

      if (data.found) {
        box.innerHTML = `
          <div class='confirm-box'>
            이전에 검사를 했습니다. 결과를 보시겠습니까?<br><br>
            <button onclick='confirmLoad(true)'>예</button>
            <button onclick='confirmLoad(false)' style='background:#6c757d;'>아니오</button>
          </div>`;
      } else {
        box.innerHTML = `
          <div class='confirm-box'>
            검사를 진행하시겠습니까?<br><br>
            <button onclick='confirmLoad(true, true)'>예</button>
            <button onclick='confirmLoad(false)' style='background:#6c757d;'>아니오</button>
          </div>`;
      }
    } catch (e) {
      box.innerHTML = `<p style='color:red;'>오류: ${e.message}</p>`;
    }
  }

  function confirmLoad(ok, isNew = false) {
    if (ok && lastSearchResult) {
      document.getElementById("searchResponse").innerHTML = "";
      renderResult(lastSearchResult);
    } else if (ok && isNew) {
      document.getElementById("searchResponse").innerHTML = "";
    } else {
      location.reload();
    }
  }

  // ── 결과 저장 + 출력 ────────────────────────────────────────────────────────
  async function submitAnswers() {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return showWarning("이름을 입력해주세요.");
    currentUserName = name;

    // 미응답 체크
    const unanswered = questionData.filter(q => !answers[q.id]);
    if (unanswered.length) {
      const missing = unanswered.map(q => q.id).join(", ");
      document.getElementById("answerWarningBox").style.display = "block";
      document.getElementById("answerWarningText").innerText =
        `다음 문항이 입력되지 않았습니다: ${missing}. 문항을 모두 입력해야 결과를 확인할 수 있습니다.`;
      return;
    }
    document.getElementById("answerWarningBox").style.display = "none";

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "저장 중...";

    try {
      const desc = await api("saveAnswers", { name, answers });
      renderResult(desc);
      setTimeout(() => document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" }), 300);
    } catch (e) {
      alert("오류: " + e.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "결과 보기";
    }
  }

  // ── 결과 렌더링 ─────────────────────────────────────────────────────────────
  function renderResult(desc) {
    if (!desc || !desc["MBTI 유형"]) {
      alert("결과 데이터를 불러올 수 없습니다.");
      return;
    }

    document.getElementById("resultSection").style.display = "block";
    document.getElementById("mbtiTitle").innerHTML =
      `당신의 성격 분석 유형: <span style='color:#007BFF'>${getCustomMbtiName(desc["MBTI 유형"])}</span>`;
    document.getElementById("mbtiSubtitle").innerHTML =
      `"${desc["별칭(일반적 특징)"]}" – <em>${desc["키워드"]}</em>`;

    const fields = [
      "공통점", "속담/격언", "싫어하는 말", "자주 듣는 말",
      "장점", "단점", "의사소통 스타일", "리더십 스타일",
      "진로 및 직업 추천", "인간관계 스타일", "스트레스 반응", "성장 전략"
    ];
    let table = "<table style='width:100%; border-collapse:collapse; border:1px solid #ccc;'>";
    fields.forEach(k => {
      table += `
        <tr>
          <th style="width:22%; padding:10px; text-align:center; vertical-align:top; background:#f0f8ff; border:1px solid #ccc;">${k}</th>
          <td style="padding:10px; text-align:left; border:1px solid #ccc;">${desc[k] || "-"}</td>
        </tr>`;
    });
    table += "</table>";
    document.getElementById("resultTable").innerHTML = table;

    drawChart(desc);
    setTimeout(() => document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" }), 300);
  }

  // ── 막대그래프 ──────────────────────────────────────────────────────────────
  function drawChart(desc) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    const ctx = document.getElementById("mbtiChart").getContext("2d");
    chartInstance = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["사회적/내적 에너지 (E-I)", "현실/직관 정보처리 (S-N)", "논리/감성 의사결정 (T-F)", "계획/즉흥 생활방식 (J-P)"],
        datasets: [
          { label: "첫 글자 (E/S/T/J)", data: [desc.E, desc.S, desc.T, desc.J], backgroundColor: "#007BFF" },
          { label: "두 번째 글자 (I/N/F/P)", data: [desc.I, desc.N, desc.F, desc.P], backgroundColor: "#f39c12" }
        ]
      },
      options: {
        plugins: {
          legend: { position: "top" },
          title: { display: true, text: "성격분석 축별 점수 비교" }
        },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // ── MBTI 유형 이름 풀어쓰기 ─────────────────────────────────────────────────
  function getCustomMbtiName(type) {
    const typeNames = {
      "INFJ": "INFJ, 창의적 통찰형", "INFP": "INFP, 자유로운 사색형",
      "ENFJ": "ENFJ, 영감을 주는 리더형", "ENFP": "ENFP, 열정적인 탐험형",
      "INTJ": "INTJ, 분석적 전략형", "INTP": "INTP, 논리적 혁신형",
      "ENTJ": "ENTJ, 결단력 있는 혁신형", "ENTP": "ENTP, 창의적 개척형",
      "ISFJ": "ISFJ, 보호적인 돌봄형", "ISFP": "ISFP, 감성적 표현형",
      "ESFJ": "ESFJ, 사교적인 조화형", "ESFP": "ESFP, 자유로운 즐거움형",
      "ISTJ": "ISTJ, 책임감 있는 현실형", "ISTP": "ISTP, 실용적인 해결형",
      "ESTJ": "ESTJ, 체계적인 지휘형", "ESTP": "ESTP, 모험적인 실용형"
    };
    return typeNames[type] || type;
  }
</script>
</body>
</html>
